<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Fresh-gate exact accuracy across Experiment 05</title>
  <desc id="desc">Base accuracy rises from 58.3 to 66.7 percent. The registered orchestration rises from 54.2 to 79.2 and finally 91.7 percent, above the 80 percent target. A post-hoc Gate 02 weighted replay reached 87.5 percent but is marked as development only.</desc>
  <rect width="1200" height="680" rx="28" fill="#07111f"/>
  <text x="80" y="55" fill="#f8fafc" font-family="Inter, ui-sans-serif, system-ui" font-size="28" font-weight="700">Experiment 05: fresh-gate exact accuracy</text>
  <text x="80" y="84" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui" font-size="15">GPT-5.6 Luna Light • 24 sequences per gate • exact next-five scoring</text>

  <g font-family="Inter, ui-sans-serif, system-ui" font-size="13" fill="#94a3b8">
    <line x1="150" y1="90" x2="1040" y2="90" stroke="#1e293b"/><text x="118" y="95">100%</text>
    <line x1="150" y1="163.3" x2="1040" y2="163.3" stroke="#1e293b"/><text x="126" y="168">90</text>
    <line x1="150" y1="236.7" x2="1040" y2="236.7" stroke="#f59e0b" stroke-width="2" stroke-dasharray="8 7"/><text x="118" y="241" fill="#fbbf24">80%</text>
    <line x1="150" y1="310" x2="1040" y2="310" stroke="#1e293b"/><text x="126" y="315">70</text>
    <line x1="150" y1="383.3" x2="1040" y2="383.3" stroke="#1e293b"/><text x="126" y="388">60</text>
    <line x1="150" y1="456.7" x2="1040" y2="456.7" stroke="#1e293b"/><text x="126" y="461">50</text>
    <line x1="150" y1="530" x2="1040" y2="530" stroke="#334155"/><text x="126" y="535">40</text>
  </g>

  <text x="900" y="226" fill="#fbbf24" font-family="Inter, ui-sans-serif, system-ui" font-size="13" font-weight="650">80% target</text>

  <polyline points="270,395.8 600,365 930,334.2" fill="none" stroke="#64748b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#94a3b8" stroke="#07111f" stroke-width="4">
    <circle cx="270" cy="395.8" r="8"/><circle cx="600" cy="365" r="8"/><circle cx="930" cy="334.2" r="8"/>
  </g>
  <text x="947" y="340" fill="#94a3b8" font-family="Inter, ui-sans-serif, system-ui" font-size="14">Base panel</text>

  <polyline points="270,425.9 600,242.5 930,150.9" fill="none" stroke="#22d3ee" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#22d3ee" stroke="#07111f" stroke-width="5">
    <circle cx="270" cy="425.9" r="11"/><circle cx="600" cy="242.5" r="11"/><circle cx="930" cy="150.9" r="13"/>
  </g>

  <line x1="600" y1="242.5" x2="600" y2="181.7" stroke="#c084fc" stroke-width="2" stroke-dasharray="5 5"/>
  <rect x="592" y="173.7" width="16" height="16" transform="rotate(45 600 181.7)" fill="#07111f" stroke="#c084fc" stroke-width="3"/>
  <text x="620" y="187" fill="#c084fc" font-family="Inter, ui-sans-serif, system-ui" font-size="13">87.5% post-hoc only</text>

  <g font-family="Inter, ui-sans-serif, system-ui" text-anchor="middle">
    <text x="270" y="414" fill="#e2e8f0" font-size="15" font-weight="700">54.2%</text>
    <text x="600" y="229" fill="#e2e8f0" font-size="15" font-weight="700">79.2%</text>
    <text x="930" y="133" fill="#67e8f9" font-size="22" font-weight="800">91.7%</text>
    <text x="270" y="565" fill="#f8fafc" font-size="16" font-weight="650">Fresh Gate 01</text>
    <text x="600" y="565" fill="#f8fafc" font-size="16" font-weight="650">Fresh Gate 02</text>
    <text x="930" y="565" fill="#f8fafc" font-size="16" font-weight="650">Fresh Gate 03</text>
    <text x="270" y="589" fill="#64748b" font-size="13">deep override</text>
    <text x="600" y="589" fill="#64748b" font-size="13">visible holdout, equal votes</text>
    <text x="930" y="589" fill="#67e8f9" font-size="13">length-weighted, preregistered</text>
  </g>

  <g font-family="Inter, ui-sans-serif, system-ui" font-size="13">
    <line x1="170" y1="630" x2="205" y2="630" stroke="#22d3ee" stroke-width="5"/><text x="215" y="635" fill="#cbd5e1">Registered orchestration</text>
    <line x1="420" y1="630" x2="455" y2="630" stroke="#64748b" stroke-width="4"/><text x="465" y="635" fill="#cbd5e1">Base 15-prompt panel</text>
    <rect x="676" y="622" width="14" height="14" transform="rotate(45 683 629)" fill="#07111f" stroke="#c084fc" stroke-width="2"/><text x="705" y="635" fill="#cbd5e1">Post-hoc development replay</text>
  </g>
</svg>
