<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
<title id="title">Adaptive call flow</title>
<desc id="desc">Fifteen base lenses analyze all 24 sequences. Extra calls are routed to 11, then 8, then 7 difficult cases. The run uses 268 actual Luna Light calls and 568 per-sequence analyses to solve 22 of 24 sequences.</desc>
<rect width="1600" height="900" fill="#090b12"/>
<text x="110.0" y="105.0" fill="#f4f3ee" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="52" font-weight="500" text-anchor="start">SPEND MORE REASONING ONLY WHERE NEEDED</text>
<text x="110.0" y="158.0" fill="#aeb4c2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="25" font-weight="400" text-anchor="start">The frozen Gate 03 orchestration</text>
<rect x="115" y="280" width="280" height="300" rx="28" fill="#111522" stroke="#4de2ff" stroke-width="3"/>
<text x="145.0" y="340.0" fill="#4de2ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21" font-weight="500" text-anchor="start">01</text>
<text x="145.0" y="405.0" fill="#f4f3ee" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="29" font-weight="500" text-anchor="start">15 base lenses</text>
<text x="145.0" y="452.0" fill="#aeb4c2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" text-anchor="start">24 sequences</text>
<text x="145.0" y="520.0" fill="#4de2ff" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="27" font-weight="500" text-anchor="start">60 bundled calls</text>
<line x1="395" y1="430" x2="472" y2="430" stroke="#2b3040" stroke-width="5"/>
<path d="M 472 430 l -18 -11 v 22 z" fill="#2b3040"/>
<rect x="500" y="280" width="280" height="300" rx="28" fill="#111522" stroke="#a78bfa" stroke-width="3"/>
<text x="530.0" y="340.0" fill="#a78bfa" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21" font-weight="500" text-anchor="start">02</text>
<text x="530.0" y="405.0" fill="#f4f3ee" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="29" font-weight="500" text-anchor="start">Visible holdout</text>
<text x="530.0" y="452.0" fill="#aeb4c2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" text-anchor="start">11 uncertain sequences</text>
<text x="530.0" y="520.0" fill="#a78bfa" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="27" font-weight="500" text-anchor="start">88 calls</text>
<line x1="780" y1="430" x2="857" y2="430" stroke="#2b3040" stroke-width="5"/>
<path d="M 857 430 l -18 -11 v 22 z" fill="#2b3040"/>
<rect x="885" y="280" width="280" height="300" rx="28" fill="#111522" stroke="#ffd166" stroke-width="3"/>
<text x="915.0" y="340.0" fill="#ffd166" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21" font-weight="500" text-anchor="start">03</text>
<text x="915.0" y="405.0" fill="#f4f3ee" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="29" font-weight="500" text-anchor="start">Recovery</text>
<text x="915.0" y="452.0" fill="#aeb4c2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" text-anchor="start">8 weakly verified sequences</text>
<text x="915.0" y="520.0" fill="#ffd166" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="27" font-weight="500" text-anchor="start">64 calls</text>
<line x1="1165" y1="430" x2="1242" y2="430" stroke="#2b3040" stroke-width="5"/>
<path d="M 1242 430 l -18 -11 v 22 z" fill="#2b3040"/>
<rect x="1270" y="280" width="280" height="300" rx="28" fill="#111522" stroke="#63e6be" stroke-width="3"/>
<text x="1300.0" y="340.0" fill="#63e6be" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21" font-weight="500" text-anchor="start">04</text>
<text x="1300.0" y="405.0" fill="#f4f3ee" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="29" font-weight="500" text-anchor="start">Worksheets</text>
<text x="1300.0" y="452.0" fill="#aeb4c2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" text-anchor="start">7 unresolved sequences</text>
<text x="1300.0" y="520.0" fill="#63e6be" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="27" font-weight="500" text-anchor="start">56 calls</text>
<text x="250.0" y="690.0" fill="#f4f3ee" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="74" font-weight="500" text-anchor="middle">268</text>
<text x="250.0" y="730.0" fill="#aeb4c2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21" font-weight="400" text-anchor="middle">actual Luna Light calls</text>
<text x="800.0" y="690.0" fill="#f4f3ee" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="74" font-weight="500" text-anchor="middle">568</text>
<text x="800.0" y="730.0" fill="#aeb4c2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21" font-weight="400" text-anchor="middle">per-sequence analyses</text>
<text x="1350.0" y="690.0" fill="#63e6be" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="74" font-weight="500" text-anchor="middle">22 / 24</text>
<text x="1350.0" y="730.0" fill="#aeb4c2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="21" font-weight="400" text-anchor="middle">exact next-five answers</text>
<text x="110.0" y="838.0" fill="#aeb4c2" font-family="Inter, ui-sans-serif, system-ui, -apple-system, sans-serif" font-size="20" font-weight="400" text-anchor="start">Base calls handled six independent sequences each. Later calls handled one sequence each.</text>
</svg>
