<title id="title">A concrete visible-holdout correction</title>
<desc id="desc">On sequence S016 the base plurality was wrong. Holdout agents first recovered the removed public terms 24 and 60, then correctly predicted 8, minus 2, 44, 79, and 28. The sequence splits into four residue streams whose step changes are linear.</desc>
